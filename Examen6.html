<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen Semana 6</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #f0f8ff; padding: 20px; }
        .question-container, .results-container { max-width: 700px; width: 100%; padding: 20px; border-radius: 10px; background: #ffffff; box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2); margin-bottom: 20px; }
        .btn { margin-top: 20px; padding: 10px 20px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .btn:hover { background-color: #45a049; }
        .hidden { display: none; }
        .results-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .results-table th, .results-table td { padding: 10px; border: 1px solid #ddd; text-align: center; }
        .results-table th { background-color: #f2f2f2; font-weight: bold; }
        .correct { color: green; font-weight: bold; }
        .incorrect { color: red; font-weight: bold; }
        .final-grade { font-size: 1.5em; font-weight: bold; color: #333; text-align: center; margin-top: 20px; }
        .navigation { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="questionContainer" class="question-container"></div>

    <script>
        const allQuestions = [
            { text: "¿Cuál es la función principal del Sistema de Nombres de Dominio (DNS)?", answer: "resolver nombres de Internet en direcciones IP" },
            { text: "¿Qué protocolo se utiliza comúnmente para acceder a páginas web?", answer: "http" },
            { text: "¿Cuál de los siguientes protocolos es utilizado para recuperar correos electrónicos de un servidor remoto?", answer: "imap" },
            { text: "¿Para qué se utiliza el protocolo SSH?", answer: "acceder a la interfaz de línea de comandos de forma segura" },
            { text: "¿Cuál es el propósito del Protocolo de transferencia de archivos (FTP)?", answer: "transferir archivos de una computadora a otra" },
            { text: "¿Qué protocolo permite que los dispositivos se configuren automáticamente para comunicarse en Internet?", answer: "dhcp" },
            { text: "¿Cuál es la principal diferencia entre los protocolos TCP y UDP?", answer: "tcp garantiza la entrega de datos; udp no" },
            { text: "¿Cuál de los siguientes no es un protocolo de correo electrónico?", answer: "http" },
            { text: "¿Qué identifica un URL en una solicitud a un servidor?", answer: "protocolo, dominio y la ubicación del recurso" },
            { text: "¿Qué servicio utiliza el puerto 80?", answer: "http" },
            { text: "¿Qué protocolo de correo electrónico se utiliza para enviar correos de un cliente a un servidor de correo?", answer: "smtp" },
            { text: "¿Qué permite la telefonía IP (VoIP)?", answer: "realizar llamadas telefónicas a través de Internet" },
            { text: "¿Qué protocolo proporciona una entrega de datos 'de mejor esfuerzo' sin confirmación de recepción?", answer: "udp" },
            { text: "¿Qué tipo de aplicaciones utilizan IMAP y POP?", answer: "clientes de correo electrónico" },
            { text: "¿Qué puerto se utiliza generalmente para los servicios web con el protocolo HTTP?", answer: "80" },
            { text: "¿Cuál es el propósito del protocolo DHCP en una red?", answer: "asignar direcciones ip y configurar dispositivos automáticamente" },
            { text: "¿Qué protocolo permite la transferencia segura de archivos mediante la red informática mundial (WWW)?", answer: "https" },
            { text: "¿Para qué se utiliza el protocolo Telnet?", answer: "crear un dispositivo virtual con acceso a la cli del servidor" },
            { text: "¿Cuál es el rol de un cliente web en una conexión HTTP?", answer: "solicitar servicios web" },
            { text: "¿Qué elemento identifica el servicio específico solicitado por un cliente en una conexión TCP?", answer: "número de puerto de destino" },
            { text: "¿Cuál de los siguientes no es un dominio de alto nivel común?", answer: ".ftp" },
            { text: "¿Para qué se utiliza el protocolo SSH?", answer: "proporcionar acceso remoto seguro" },
            { text: "¿Cuál es la función del protocolo SMTP?", answer: "enviar correos entre servidores" },
            { text: "¿Qué es una dirección IP?", answer: "un identificador único de cada dispositivo en la red" },
            { text: "¿Qué capa del modelo TCP/IP permite la comunicación entre aplicaciones?", answer: "aplicación" }
        ];

        const questions = allQuestions.sort(() => Math.random() - 0.5).slice(0, 10);
        let currentQuestion = 0;
        const questionContainer = document.getElementById("questionContainer");

        function loadQuestion() {
            if (currentQuestion < questions.length) {
                const q = questions[currentQuestion];
                questionContainer.innerHTML = `
                    <h2>Pregunta ${currentQuestion + 1}</h2>
                    <p>${q.text}</p>
                    <input type="text" id="userAnswer" placeholder="Escribe tu respuesta aquí">
                    <button class="btn" onclick="nextQuestion()">Siguiente</button>
                `;
                questionContainer.classList.remove("hidden");
            }
        }

        function nextQuestion() {
            const userAnswer = document.getElementById("userAnswer").value.trim().toLowerCase();
            if (userAnswer === "") {
                alert("Por favor, escribe una respuesta.");
                return;
            }
            questions[currentQuestion].userAnswer = userAnswer;
            currentQuestion++;
            if (currentQuestion < questions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            let score = 0;
            questions.forEach(q => { if (q.userAnswer === q.answer.toLowerCase()) score++; });
            const grade = (score / questions.length) * 10;

            questionContainer.innerHTML = `
                <div class="results-container">
                    <h2>Resultados del Examen</h2>
                    <table class="results-table">
                        <thead>
                            <tr>
                                <th>Pregunta</th>
                                <th>Tu Respuesta</th>
                                <th>Respuesta Correcta</th>
                                <th>Resultado</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${questions.map(q => `
                                <tr>
                                    <td>${q.text}</td>
                                    <td>${q.userAnswer || "No respondida"}</td>
                                    <td>${q.answer}</td>
                                    <td class="${q.userAnswer === q.answer.toLowerCase() ? 'correct' : 'incorrect'}">
                                        ${q.userAnswer === q.answer.toLowerCase() ? "✅ Correcto" : "❌ Incorrecto"}
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    <div class="final-grade">Calificación final: ${grade.toFixed(1)} / 10</div>
                    <div class="navigation">
                        <button class="btn" onclick="window.location.reload()">Volver a intentar</button>
                    </div>
                </div>
            `;
        }

        loadQuestion();
    </script>
</body>
</html>
